# 正則化パラメータ (0.0〜1.0)
lambda: 0.5

# 使用する主成分数
n_components: 3

# ローリングウィンドウ（営業日数）
rolling_window: 60

# 上位・下位何業種をサジェストするか
top_n: 3

# 米国業種ETF (11業種, SPDR系)
us_etfs:
  XLB: Materials
  XLC: Communication
  XLE: Energy
  XLF: Financials
  XLI: Industrials
  XLK: Technology
  XLP: ConsumerStaples
  XLRE: RealEstate
  XLV: Healthcare
  XLW: Utilities
  XLY: ConsumerDiscretionary

# 日本業種ETF (東証上場, 17業種対応)
jp_etfs:
  1615.T: Banks
  1616.T: Financials
  1617.T: Foods
  1618.T: Energy
  1619.T: Construction
  1620.T: Manufacturers
  1621.T: Steel
  1622.T: Chemicals
  1623.T: Electronics
  1624.T: Automobiles
  1625.T: Precision
  1626.T: OtherManufacturing
  1627.T: Commerce
  1628.T: Finance
  1629.T: RealEstate
  1630.T: RailRoad
  1631.T: Services
